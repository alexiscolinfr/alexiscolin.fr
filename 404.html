<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <!-- GDPR cookie consent + GA — shared with index.html via cookie-banner.js -->
  <script src="/cookie-banner.js?v=7" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Alexis Colin</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/web-app-manifest-192x192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="/style.css?v=13" />
  <script>
    (function(){
      try {
        var s = localStorage.getItem('theme');
        if (s) document.documentElement.dataset.theme = s;
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <p class="error-title" id="err-title">Page introuvable</p>
    <p class="error-desc" id="err-desc">Cette page n'existe pas ou a été déplacée.</p>
    <a href="/" class="btn btn--accent" id="err-btn" style="margin-top:8px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span id="err-btn-text">Retour à l'accueil</span>
    </a>
    <nav class="error-nav" aria-label="Sections">
      <a href="/#about"      id="err-l-about">À propos</a>
      <a href="/#experience" id="err-l-exp">Expérience</a>
      <a href="/#projects"   id="err-l-projects">Projets</a>
      <a href="/#contact"    id="err-l-contact">Contact</a>
    </nav>
    <script>
      try {
        if (localStorage.getItem('lang') === 'en') {
          document.documentElement.lang = 'en';
          document.getElementById('err-title').textContent   = 'Page not found';
          document.getElementById('err-desc').textContent    = 'This page doesn\'t exist or has been moved.';
          document.getElementById('err-btn-text').textContent = 'Back to home';
          document.getElementById('err-l-about').textContent    = 'About';
          document.getElementById('err-l-exp').textContent      = 'Experience';
          document.getElementById('err-l-projects').textContent = 'Projects';
          document.getElementById('err-l-contact').textContent  = 'Contact';
        }
      } catch(e) {}
    </script>
  </div>
</body>
</html>
