name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  html:
    name: HTML validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx --yes html-validate "*.html"

  links:
    name: Dead links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          # --root-dir: resolve root-relative links (/assets/..., /#about) against the repo
          # --exclude formspree: the form endpoint only accepts POST, HEAD checks get a 405
          # 403/429/999: LinkedIn and the like block bots — don't fail
          # the CI over a link that is actually valid
          args: >-
            --no-progress
            --root-dir "${{ github.workspace }}"
            --exclude 'formspree\.io'
            --accept '200..=299,403,429,999'
            './*.html'
          fail: true

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
